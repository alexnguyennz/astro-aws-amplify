version: 1
applications:
  - appRoot: demos/blog
    frontend:
      phases:
        preBuild:
          commands:
            - npm i -g pnpm
            - pnpm config set store-dir .pnpm-store
            - pnpm i
        build:
          commands:
            #- env | grep -e VITE_ >> .env.production
            #- env | grep -e VITE_API_KEY >> .env
            #- env | grep -e VITE_API_KEY >> .env.production
            #- env | grep -e SUPABASE_ >> .env
            #- env | grep -e SUPABASE_ >> .env.production
            - env | grep -e SUPABASE_API_KEY >> .env # not working
            #- env | grep -e PUBLIC_ >> .env # working
            - SUPABASE_API_KEY=passed pnpm run build
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**/*