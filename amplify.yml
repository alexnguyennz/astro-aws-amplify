version: 1
applications:
  - appRoot: demos/blog
    frontend:
      phases:
        preBuild:
          commands:
            - npm i -g pnpm
            - pnpm config set store-dir .pnpm-store
            - pnpm i
        build:
          commands:
            - echo "SUPABASE_API_KEY=teststaticsupabase" >> .env
            - echo "PUBLIC_ASTRO=teststaticpublic" >> .env
            - echo "SUPABASE_API_KEY=teststaticsupabase" >> .env
            - echo "SUPABASE_API_KEY=teststaticsupabase" >> .env
            - pnpm run build
            - echo "SUPABASE_API_KEY=teststaticsupabase" >> .env
            - echo "SUPABASE_API_KEY=$SUPABASE_API_KEY" >> .env
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**/*