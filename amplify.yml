version: 1
applications:
  - appRoot: demos/blog
    frontend:
      phases:
        preBuild:
          commands:
            - npm i -g pnpm
            - pnpm config set store-dir .pnpm-store
            - pnpm i
        build:
          commands:
            # - echo "PUBLIC_ASTRO=teststaticpublic" >> .env # working
            #- echo "SUPABASE_API_KEY=teststaticsupabase" >> .env
            - env | grep -e SUPABASE_ >> .env
            - env | grep -e PUBLIC_ >> .env # working
            - pnpm run build
      artifacts:
        baseDirectory: .amplify-hosting
        files:
          - '**/*'
      cache:
        paths:
          - .pnpm-store/**/*